{% extends 'base.html' %}
{% block extrahead %}
  <!-- STEP :
  1 : load the JS librairy
  2 : required public key and the JS parameters as url sucess -->
      <script type="text/javascript"
              src="https://static.micuentaweb.pe/static/js/krypton-client/V4.0/stable/kr-payment-form.min.js"
              kr-public-key="{{data.public_key}}"
              kr-post-url-success="result">
      </script>

      <!-- 3 : theme classic should be loaded in the HEAD section   -->
      <link rel="stylesheet" href="https://static.micuentaweb.pe/static/js/krypton-client/V4.0/ext/classic.css">
      <script type="text/javascript" src="https://static.micuentaweb.pe/static/js/krypton-client/V4.0/ext/classic.js">
      </script>
{% endblock %}
{% block extrastyles %}
{% endblock %}

{% block body %}
    <section class="container" >
	<div class="row">
      		<div class="col-md-3"></div>
      		<div class="center-column col-md-6">
        	<section class="payment-form">
          		<div class="row">
           			<li>Pago con tarjeta de crédito/débito</li>
            			<img src="https://github.com/izipay-pe/Imagenes/blob/main/logo_tarjetas_aceptadas/logo-tarjetas-aceptadas-351x42.png?raw=true" alt="Tarjetas aceptadas" style="width: 200px;">
          		</div>
          		<hr>
          		<div id="micuentawebstd_rest_wrapper">
				<!-- HTML para incrustar la pasarela de pagos-->
				<div class="kr-embedded" kr-popin kr-form-token="{{data.formToken}}"></div>	
          		</div>
        	</section>
      		</div>
     			<div class="col-md-3"></div>
    		</div>
   </section>
{% endblock %}

{% block extrajs %}
    <script>
    </script>
{% endblock %}
